<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">PulseOps Operational Dashboard preview</title>
  <desc id="desc">A visual preview of the Grafana dashboard panels for job success rate, p95 job duration, and queue depth.</desc>
  <rect width="1040" height="560" rx="28" fill="#101820"/>
  <rect x="32" y="32" width="976" height="496" rx="22" fill="#17242f" stroke="#294252"/>
  <text x="64" y="82" fill="#f3f7f4" font-family="Verdana, sans-serif" font-size="28" font-weight="700">PulseOps Operational Dashboard</text>
  <text x="64" y="112" fill="#9cb7ad" font-family="Verdana, sans-serif" font-size="14">Prometheus-backed runtime evidence from the API and Oban worker path</text>

  <rect x="64" y="148" width="432" height="152" rx="16" fill="#203440" stroke="#35576a"/>
  <text x="88" y="184" fill="#f3f7f4" font-family="Verdana, sans-serif" font-size="18" font-weight="700">Job Success Rate</text>
  <text x="88" y="210" fill="#9cb7ad" font-family="Verdana, sans-serif" font-size="12">sum(rate(pulse_ops_job_stop_count{status="succeeded"}[5m]))</text>
  <polyline points="88,268 140,252 192,258 244,226 296,232 348,202 400,206 452,188" fill="none" stroke="#44d7a8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="452" cy="188" r="6" fill="#44d7a8"/>

  <rect x="544" y="148" width="432" height="152" rx="16" fill="#203440" stroke="#35576a"/>
  <text x="568" y="184" fill="#f3f7f4" font-family="Verdana, sans-serif" font-size="18" font-weight="700">p95 Job Duration</text>
  <text x="568" y="210" fill="#9cb7ad" font-family="Verdana, sans-serif" font-size="12">histogram_quantile(0.95, rate(pulse_ops_job_stop_duration_bucket[5m]))</text>
  <rect x="580" y="248" width="46" height="28" rx="6" fill="#4bb3fd"/>
  <rect x="642" y="228" width="46" height="48" rx="6" fill="#4bb3fd"/>
  <rect x="704" y="240" width="46" height="36" rx="6" fill="#4bb3fd"/>
  <rect x="766" y="198" width="46" height="78" rx="6" fill="#4bb3fd"/>
  <rect x="828" y="216" width="46" height="60" rx="6" fill="#4bb3fd"/>
  <rect x="890" y="186" width="46" height="90" rx="6" fill="#4bb3fd"/>

  <rect x="64" y="332" width="912" height="148" rx="16" fill="#203440" stroke="#35576a"/>
  <text x="88" y="368" fill="#f3f7f4" font-family="Verdana, sans-serif" font-size="18" font-weight="700">Queue Depth</text>
  <text x="88" y="394" fill="#9cb7ad" font-family="Verdana, sans-serif" font-size="12">max by (queue, status) (pulse_ops_queue_depth)</text>
  <line x1="88" y1="438" x2="940" y2="438" stroke="#35576a" stroke-width="2"/>
  <polyline points="88,438 184,438 280,416 376,432 472,404 568,438 664,428 760,412 856,438 940,420" fill="none" stroke="#f7c948" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="88" y="506" fill="#9cb7ad" font-family="Verdana, sans-serif" font-size="12">Panels map directly to ops/grafana/dashboards/pulseops-dashboard.json</text>
</svg>
