version: 2
updates:
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    groups:
      elixir-runtime:
        patterns:
          - "phoenix*"
          - "ecto*"
          - "oban"
          - "postgrex"
      observability:
        patterns:
          - "opentelemetry*"
          - "telemetry*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Sao_Paulo"
