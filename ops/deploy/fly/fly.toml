app = "pulseops-elixir-job-platform"
primary_region = "gru"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[env]
  PHX_SERVER = "true"
  PHX_HOST = "pulseops-elixir-job-platform.fly.dev"
  PORT = "4000"
  POOL_SIZE = "10"
  API_RATE_LIMIT_STORAGE = "postgres"
  JOB_RETENTION_PRUNING_INTERVAL_MS = "86400000"
  WEBHOOK_ALLOW_HTTP = "false"
  WEBHOOK_ALLOW_PRIVATE_NETWORKS = "false"
  WEBHOOK_RESOLVE_DNS = "true"
  WEBHOOK_CIRCUIT_FAILURE_THRESHOLD = "5"
  WEBHOOK_CIRCUIT_RESET_AFTER_MS = "60000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    path = "/readyz"
    timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
