services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse_ops_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pulseops-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: ecto://postgres:postgres@postgres/pulse_ops_dev
      SECRET_KEY_BASE: 4M4IB5z4lODkSOcQm4uNX1mQv1l5hMPU9B2X0cA1DqfQz0F1zW9O7pL2V0hYtQ9p
      PHX_HOST: localhost
      PHX_SERVER: "true"
      PORT: 4000
      POOL_SIZE: 10
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pulseops-postgres:
